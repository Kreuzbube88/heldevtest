name: Delete All Packages

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type DELETE to confirm'
        required: true
        type: string

jobs:
  delete-packages:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'DELETE'

    permissions:
      packages: write
      contents: read

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DELETE" ]; then
            echo "❌ Confirmation failed. You must type 'DELETE' to proceed."
            exit 1
          fi
          echo "✅ Confirmation validated"

      - name: Delete all package versions
        uses: actions/delete-package-versions@v4
        with:
          package-name: 'heldevtest'
          package-type: 'container'
          token: ${{ secrets.GITHUB_TOKEN }}
          min-versions-to-keep: 0
          delete-only-untagged-versions: false

      - name: Summary
        run: |
          echo "## 🗑️ Package Deletion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All package versions for 'heldevtest' have been deleted." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
