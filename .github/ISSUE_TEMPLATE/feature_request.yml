name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        # ✨ Feature Request

        Have an idea? We'd love to hear it! Help us understand what you need.

        ---

  - type: dropdown
    id: category
    attributes:
      label: 🎯 Feature Category
      description: Which area does this feature relate to?
      options:
        - 🎨 UI/UX
        - 🧪 Test Execution
        - 📤 Export Functionality
        - 📋 Templates
        - 🔐 Authentication
        - ⚙️ Settings
        - ⚡ Performance
        - 🌐 Internationalization
        - 📱 Mobile Support
        - 🔌 Integrations
        - 📊 Reporting
        - 🎭 Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when I have to manually..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: How should this feature work?
      placeholder: "I would like to be able to click a button that automatically..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔀 Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: "I've tried using..., but it doesn't work well because..."

  - type: textarea
    id: mockups
    attributes:
      label: 🎨 Mockups / Examples
      description: Add mockups, screenshots from other tools, or detailed descriptions
      placeholder: "Upload images or describe the UI/workflow in detail..."

  - type: dropdown
    id: priority
    attributes:
      label: 🚦 Priority (from your perspective)
      options:
        - 🟢 Low - Nice to have
        - 🟡 Medium - Would improve workflow
        - 🔴 High - Critical for my use case
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 🤝 Contribution
      options:
        - label: I am willing to help implement this feature
        - label: I can help test this feature
        - label: I can provide more details if needed

  - type: markdown
    attributes:
      value: |
        ---

        💫 **Thanks for helping shape the future of HELDEVTEST!**
