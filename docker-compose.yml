version: '3.8'

services:
  heldevtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heldevtest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - heldevtest-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DB_PATH=/app/data/heldevtest.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/auth/status', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  heldevtest-data:
    driver: local
